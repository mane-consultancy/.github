name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem, limitation, or opportunity is this request addressing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives, workarounds, or tradeoffs.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits from this and how?
